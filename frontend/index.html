<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CuadraCaja</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
</head>

<body>
    <div class="app">
        <header class="header">
            <img src="/frontend/logo.png" class="logo-big" />
            <div>
                <h1>CORTE DE CAJA</h1>
                <p>EL GALLO D'ORO</p>
            </div>
        </header>

        <main class="dashboard">
            <section class="card form-card">
                <form id="cashCutForm">
                    <div class="grid">
                        <div class="field">
                            <label for="fondo_inicial">Fondo inicial</label>
                            <input type="number" id="fondo_inicial" required />
                        </div>

                        <div class="field">
                            <label for="venta_total">Venta total</label>
                            <input type="number" id="venta_total" required />
                        </div>

                        <div class="field">
                            <label for="total_tarjeta">Venta con tarjeta</label>
                            <input type="number" id="total_tarjeta" required />
                        </div>

                        <div class="field">
                            <label for="otros_ingresos_efectivo">Otros ingresos en efectivo</label>
                            <input type="number" id="otros_ingresos_efectivo" required />
                        </div>

                        <div class="field">
                            <label for="gastos_efectivo">Gastos en efectivo</label>
                            <input type="number" id="gastos_efectivo" required />
                        </div>

                        <div class="field">
                            <label for="gastos_tarjeta">Gastos en tarjeta</label>
                            <input type="number" id="gastos_tarjeta" required />
                        </div>
                    </div>

                    <h3>Denominaciones</h3>

                    <div class="grid">
                        <div class="field">
                            <label for="d1000">1000</label>
                            <input type="number" id="d1000" required />
                        </div>

                        <div class="field">
                            <label for="d500">500</label>
                            <input type="number" id="d500" required />
                        </div>

                        <div class="field">
                            <label for="d200">200</label>
                            <input type="number" id="d200" required />
                        </div>

                        <div class="field">
                            <label for="d100">100</label>
                            <input type="number" id="d100" required />
                        </div>

                        <div class="field">
                            <label for="d50">50</label>
                            <input type="number" id="d50" required />
                        </div>

                        <div class="field">
                            <label for="d20">20</label>
                            <input type="number" id="d20" required />
                        </div>

                        <div class="field">
                            <label for="d10">10</label>
                            <input type="number" id="d10" required />
                        </div>

                        <div class="field">
                            <label for="d5">5</label>
                            <input type="number" id="d5" required />
                        </div>

                        <div class="field">
                            <label for="d2">2</label>
                            <input type="number" id="d2" required />
                        </div>

                        <div class="field">
                            <label for="d1">1</label>
                            <input type="number" id="d1" required />
                        </div>

                    </div>

                    <button type="button" id="calculateBtn">Calcular</button>
                </form>
            </section>

            <section class="card results-card">
                <h2>Resultados</h2>

                <div id="results" class="results-grid">
                    <div class="result-box">
                        <span>Estado</span>
                        <strong>Esperando...</strong>
                    </div>
                </div>
            </section>

            <div id="utilidadMensual" class="card">
                Utilidad mensual: $0
            </div>

            <div id="totalUtilidad" class="card">
                Utilidad total: $0
            </div>

            <section class="card results-card">
                <h2>Historial de cortes</h2>

                <button type="button" id="loadHistoryBtn">Ver Historial</button>

                <div id="history" class="results-grid">
                    <div class="result-box">
                        <strong>Sin datos</strong>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/frontend/script.js"></script>
</body>

</html>
